<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F.R.I.D.A.Y — Holographic V2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="scanline-overlay"></div>
    <div class="radar-sweep"></div>
    <canvas id="particleCanvas"></canvas>
    <div id="bootScreen" class="boot-screen">
        <div style="text-align: center; color: var(--cyan);">
            <div style="margin-bottom: 20px;">
                <svg viewBox="0 0 200 200" width="120" style="filter: drop-shadow(0 0 15px var(--cyan));">
                    <polygon fill="none" stroke="var(--cyan)" stroke-width="2" points="100,10 180,55 180,145 100,190 20,145 20,55" />
                    <text x="100" y="125" font-family="Orbitron" font-size="60" font-weight="900" fill="var(--cyan)" text-anchor="middle">F</text>
                </svg>
            </div>
            <h1 style="font-family: Orbitron; font-size: 32px; letter-spacing: 12px; margin-bottom: 10px;">F.R.I.D.A.Y</h1>
            <p id="bootStatus" style="font-family: Share Tech Mono; font-size: 14px; color: var(--teal); letter-spacing: 4px; text-transform: uppercase;">Booting systems...</p>
        </div>
    </div>
    <div id="mainInterface" class="main-interface" style="opacity: 0;">
        <header class="top-bar">
            <div class="logo-mark">
                <svg viewBox="0 0 40 40" class="logo-hex-small">
                    <polygon points="20,2 36,11 36,29 20,38 4,29 4,11" />
                </svg>
                <span>F.R.I.D.A.Y</span>
            </div>
            <div style="text-align: center;">
                <div class="clock" id="clock">00:00:00</div>
                <div class="date" id="date">SYNCING DATE...</div>
            </div>
            <div class="status-pill" id="connectionStatus">
                <span style="font-size:18px;" id="statusIcon">⚡</span>
                <span class="status-text">INITIALIZING</span>
            </div>
        </header>
        <div class="content-grid">
            <aside class="panel left-panel">
                <div class="panel-header">❖ SYSTEM DIAGNOSTICS ❖</div>
                <div class="stat-card" id="cpuCard">
                    <div class="stat-label">CPU MATRIX</div>
                    <div class="stat-value" id="cpuValue">—</div>
                    <div class="stat-bar-track"><div class="stat-bar" id="cpuBar"></div></div>
                </div>
                <div class="stat-card" id="ramCard">
                    <div class="stat-label">MEMORY ALLOCATION</div>
                    <div class="stat-value" id="ramValue">—</div>
                    <div class="stat-bar-track"><div class="stat-bar" id="ramBar"></div></div>
                </div>
                <div class="stat-card" id="diskCard">
                    <div class="stat-label">STORAGE CAPACITY</div>
                    <div class="stat-value" id="diskValue">—</div>
                    <div class="stat-bar-track"><div class="stat-bar" id="diskBar"></div></div>
                </div>
            </aside>
            <main class="center-panel">
                <div class="arc-reactor-container" id="arcReactorContainer">
                    <div class="arc-reactor">
                        <div class="reactor-base"></div>
                        <div class="reactor-ring ring-1"></div>
                        <div class="reactor-ring ring-2"></div>
                        <div class="reactor-ring ring-3"></div>
                        <div class="audio-ring" id="audioRing"></div>
                        <div class="reactor-core"></div>
                    </div>
                    <div class="reactor-label">NEURAL INTERFACE ACTIVE</div>
                </div>
                <div class="chat-container">
                    <div class="chat-messages" id="chatMessages"></div>
                </div>
                <div class="input-area">
                    <div class="input-wrapper">
                        <input type="text" id="messageInput" placeholder="Awaiting protocol input..." autocomplete="off">
                        <button id="sendBtn" class="action-circle-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 2L11 13M22 2L15 22L11 13M22 2L2 9L11 13"/>
                            </svg>
                        </button>
                        <button id="voiceBtn" class="action-circle-btn voice-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                <line x1="12" y1="19" x2="12" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </main>
            <aside class="panel right-panel">
                <div class="panel-header">❖ FAST-ACTION HOLOGUIDE ❖</div>
                <div class="quick-actions">
                    <button class="btn-hologram" data-command="open browser">
                        <span class="action-icon">🌐</span>
                        <span>INTERNET</span>
                    </button>
                    <button class="btn-hologram" data-command="open vscode">
                        <span class="action-icon">💻</span>
                        <span>CODE BASE</span>
                    </button>
                    <button class="btn-hologram" data-command="open file explorer">
                        <span class="action-icon">📂</span>
                        <span>FILESYSTEM</span>
                    </button>
                    <button class="btn-hologram" data-command="take a screenshot">
                        <span class="action-icon">📸</span>
                        <span>CAPTURE</span>
                    </button>
                </div>
                <div class="panel-header" style="margin-top: 30px;">❖ TELEMETRY LOG ❖</div>
                <div style="background: rgba(0,0,0,0.3); padding: 16px; border-radius: 8px; border: 1px dashed var(--border-color); text-align: center;">
                    <span style="display:block; font-family:var(--font-mono); color:var(--cyan-dim); margin-bottom:10px;">LATENCY (CORE)</span>
                    <span style="font-family:var(--font-display); font-size:24px; color:var(--electric); text-shadow:0 0 10px var(--cyan);" id="latency">-- ms</span>
                </div>
                <div class="panel-header" style="margin-top: 20px;">❖ DATA STREAM ❖</div>
                <div id="matrixLog" style="height: 120px; overflow-y: hidden; background: rgba(0,255,255,0.02); border: 1px dashed rgba(0, 243, 255, 0.2); border-radius: 8px; font-family: var(--font-mono, 'Share Tech Mono'); font-size: 10px; color: var(--cyan-dim, #0ff); padding: 8px; text-align: left; display: flex; flex-direction: column; justify-content: flex-end; mask-image: linear-gradient(to bottom, transparent, black 30%); -webkit-mask-image: linear-gradient(to bottom, transparent, black 30%);">
                </div>
                <button class="btn-hologram" style="margin-top: 16px; width: 100%; border-color: rgba(255, 61, 0, 0.4); color: var(--red-alert);" id="clearBtn">
                    <span class="action-icon" style="filter: drop-shadow(0 0 5px var(--red-alert));">⟲</span>
                    <span>FLUSH MEMORY</span>
                </button>
            </aside>
        </div>
    </div>
    <audio id="snd-boot" src="data:audio/wav;base64,UklGRmYBAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YUMBAAAfHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8fHx8f"></audio>
    <script src="app.js"></script>
</body>
</html>
